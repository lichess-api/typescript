name: Update API

on:
  schedule:
    - cron: "0 3 * * 1"
    - cron: "0 3 * * 4"
    - cron: "0 3 * * 6"
  workflow_dispatch:

permissions: {}

jobs:
  update-api:
    name: Update API
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.BOT_PAT }}

      - name: Checkout lichess-org/api
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: lichess-org/api
          ref: master
          path: lichess-api
          fetch-depth: 1

      - name: Copy files
        run: |
          rm -rf specs/*

          mkdir -p specs/schemas specs/tags

          cp -r lichess-api/doc/specs/schemas/.         specs/schemas/
          cp -r lichess-api/doc/specs/tags/.            specs/tags/
          cp    lichess-api/doc/specs/lichess-api.yaml  specs/lichess-api.yaml

          rm -rf lichess-api

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: ".bun-version"

      - name: Install dependencies
        run: bun ci

      - name: Generate files
        run: bun run gen

      - name: Build
        run: bun run build

      - name: Typecheck code
        run: bun run typecheck

      - name: Run tests
        run: bun run test

      - name: Create or update Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.BOT_PAT }}
          commit-message: "feat: update api"
          title: "feat: update api"
          committer: Bot <bot@rman.dev>
          author: Bot <bot@rman.dev>
          body: Update API
          branch: update-api
          delete-branch: true
          assignees: gameroman
          reviewers: gameroman
          labels: update-api

      - name: Notify Discord
        if: always()
        uses: sarisia/actions-status-discord@eb045afee445dc055c18d3d90bd0f244fd062708 # v1.16.0
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          status: ${{ job.status }}
          title: "Update API (#${{ github.run_number }})"
          description: |
            Status: **${{ job.status }}**
            Branch: ${{ github.ref_name }}
            Trigger: ${{ github.event_name }}
            Commit: ${{ github.sha }}
